map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

upstream attendance_dashboard {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream attendance_device_gateway {
  server 127.0.0.1:4001;
  keepalive 16;
}

server {
  listen 80;
  server_name attendance.example.com devices.attendance.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name attendance.example.com;

  ssl_certificate /etc/letsencrypt/live/attendance.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/attendance.example.com/privkey.pem;

  client_max_body_size 2m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://attendance_dashboard;
  }
}

server {
  listen 443 ssl http2;
  server_name devices.attendance.example.com;

  ssl_certificate /etc/letsencrypt/live/devices.attendance.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/devices.attendance.example.com/privkey.pem;

  client_max_body_size 128k;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://attendance_device_gateway;
  }
}
