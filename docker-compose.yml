services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attendance_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-attendance}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1:5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance"]
      interval: 10s
      timeout: 5s
      retries: 5

  device-gateway:
    build:
      context: .
      dockerfile: apps/device-gateway/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_dev_password}@postgres:5432/${POSTGRES_DB:-attendance}?schema=public
      DEVICE_SIGNATURE_MAX_AGE_SECONDS: ${DEVICE_SIGNATURE_MAX_AGE_SECONDS:-300}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
    ports:
      - "${DEVICE_GATEWAY_BIND:-127.0.0.1:4001}:4001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4001/healthz'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_dev_password}@postgres:5432/${POSTGRES_DB:-attendance}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-session-secret-change-for-shared-envs}
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1:3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/healthz'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-attendance}:${POSTGRES_PASSWORD:-attendance_dev_password}@postgres:5432/${POSTGRES_DB:-attendance}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
