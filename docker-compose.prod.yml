services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}

  device-gateway:
    environment:
      DEVICE_SIGNATURE_MAX_AGE_SECONDS: ${DEVICE_SIGNATURE_MAX_AGE_SECONDS:-300}
      NODE_ENV: production
      PORT: 4001

  dashboard:
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}

  worker:
    environment:
      NODE_ENV: production
