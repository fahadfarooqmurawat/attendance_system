name: Firmware

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  platformio:
    name: PlatformIO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Prepare firmware config
        run: cp apps/firmware/include/config.example.h apps/firmware/include/config.h

      - name: Build firmware
        run: pio run -d apps/firmware
